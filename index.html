<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  background: #f5f7fa; color: #1a1a2e; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 40px 20px;
}
.container { max-width: 680px; width: 100%; }
.header {

  border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  margin-bottom: 16px; display: flex; gap: 20px; align-items: center;
  text-decoration: none; color: inherit;
  transition: box-shadow .2s, transform .2s;
}
.card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); transform: translateY(-2px); }
.card-icon { font-size: 36px; flex-shrink: 0; }
.card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: #1e40af; }
.card-desc { font-size: 13px; color: #64748b; line-height: 1.6; }
.card-arrow { margin-left: auto; color: #94a3b8; font-size: 20px; flex-shrink: 0; }
